name: Verify Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '!server/**/*.md'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - 'eslint.config.mjs'
      - 'tsconfig.json'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - '!server/**/*.md'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - 'eslint.config.mjs'
      - 'tsconfig.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck Server
        run: npm run typecheck -w server

      - name: Lint
        run: npm run lint

      - name: Dependency audit
        run: npm audit --audit-level=critical

      - name: Build Server
        run: npm run build -w server
